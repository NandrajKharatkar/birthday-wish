<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <!-- SEO Best Practices implemented: descriptive Title, appropriate Meta elements -->
    <meta name="description" content="A beautiful interactive birthday wish website for my friend.">

    <style>
        /* Modern Fonts from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        :root {
            --bg-color-1: #0f0c29;
            --bg-color-2: #302b63;
            --bg-color-3: #24243e;
            --text-main: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(255, 117, 140, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Enhance 3D effect for child elements */
            perspective: 1000px;
        }

        /* Dynamic background gradient animation */
        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.2);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s ease, opacity 0.4s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        /* Subtle shine reflection over the glass card */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            animation: shine 7s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        /* 3D Hover Effect */
        .glass-card:hover {
            transform: translateY(-10px) rotateX(4deg) rotateY(4deg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 40px var(--accent-glow);
        }

        /* Premium Typography for Title */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 600;
            margin-bottom: 1.5rem;
            /* Vibrant text gradient */
            background: linear-gradient(to right, #ff7eb3, #ff758c, #ff7eb3);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 4s linear infinite;
            /* Pop-out effect based on 3D container */
            transform: translateZ(40px);
        }

        @keyframes textShine {
            to {
                background-position: 200% center;
            }
        }

        p.message {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 2.5rem;
            transform: translateZ(30px);
            transition: opacity 0.3s ease;
        }

        /* Vibrant Call-to-Action Button */
        .btn-celebrate {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 117, 140, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translateZ(50px);
            position: relative;
            overflow: hidden;
        }

        .btn-celebrate::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: scale(0.5);
        }

        .btn-celebrate:hover {
            transform: translateY(-3px) translateZ(50px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 117, 140, 0.7);
        }

        .btn-celebrate:hover::after {
            opacity: 1;
            transform: scale(1);
        }

        .btn-celebrate:active {
            transform: translateY(1px) translateZ(50px) scale(0.98);
        }

        /* Button Group layout */
        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2.5rem;
            transform: translateZ(30px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        /* Memories Screen */
        #memories-card {
            display: none;
            opacity: 0;
            transform: scale(0.9) rotateX(-10deg);
        }

        #memories-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transform: translateZ(40px);
        }

        .memories-desc {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }

        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
            max-height: 55vh;
            overflow-y: auto;
            padding: 1rem;
            transform: translateZ(20px);
        }

        /* Custom Scrollbar for Grid */
        .memories-grid::-webkit-scrollbar {
            width: 8px;
        }
        .memories-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .memories-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .polaroid {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 10px 15px 10px;
            border-radius: 4px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transform: rotate(-3deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #333;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .polaroid:nth-child(even) {
            transform: rotate(3deg);
        }

        .polaroid:nth-child(3n) {
            transform: rotate(-1deg);
        }

        .polaroid:hover {
            transform: scale(1.08) rotate(0deg) translateZ(30px);
            z-index: 10;
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 2px;
            background: #eee;
        }

        .polaroid .note {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1rem;
            margin-top: 10px;
            text-align: center;
            color: #222;
        }

        .back-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            font-family: 'Outfit';
            cursor: pointer;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: color 0.3s ease;
            transform: translateZ(30px);
        }

        .back-btn:hover {
            color: white;
            text-decoration: underline;
        }

        /* Floating background particles container */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="confetti-container" aria-hidden="true"></div>

    <main class="container">
        <!-- Unique ID added for interaction -->
        <article class="glass-card" id="birthday-card">
            <h1>Happy Birthday!</h1>
            <p class="message" id="personal-message">
                Wishing you a magical day and a fantastic year ahead. May all your dreams come true!
            </p>

            <div class="btn-group">
                <button class="btn-celebrate" id="celebrate-btn" onclick="triggerMagic()">Make a Wish ✨</button>
                <button class="btn-secondary" onclick="showMemories()">📸 View Memories</button>
            </div>
        </article>

        <!-- Memories Overlay Card -->
        <article class="glass-card" id="memories-card">
            <h2>Our Best Memories</h2>
            <p class="memories-desc">Some unforgotten moments</p>
            <div class="memories-grid">
                <div class="polaroid">
                    <img src="file:///C:/Users/ASUS/OneDrive/Pictures/IMG_20250908_125403_951[1].webp" alt="Memory 1" onerror="this.src='https://images.unsplash.com/photo-1511895426328-dc8714191300?w=400&q=80';">
                    <div class="note">That amazing trip!</div>
                </div>
                <div class="polaroid">
                    <img src="file:///C:/Users/ASUS/OneDrive/Pictures/IMG_20250908_125403_951[1].webp" alt="Memory 2" onerror="this.src='https://images.unsplash.com/photo-1529156069898-49953eb1b5ce?w=400&q=80';">
                    <div class="note">Unforgettable laughs</div>
                </div>
                <div class="polaroid">
                    <img src="file:///C:/Users/ASUS/OneDrive/Pictures/IMG_20250908_125403_951[1].webp" alt="Memory 3" onerror="this.src='https://images.unsplash.com/photo-1543807535-eceef0bc6599?w=400&q=80';">
                    <div class="note">Fun times together</div>
                </div>
                <div class="polaroid">
                    <img src="file:///C:/Users/ASUS/OneDrive/Pictures/IMG_20250908_125403_951[1].webp" alt="Memory 4" onerror="this.src='https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?w=400&q=80';">
                    <div class="note">Always smiling :)</div>
                </div>
            </div>
            <button class="back-btn" onclick="hideMemories()">← Back to Birthday Card</button>
        </article>
    </main>

    <!-- Canvas Confetti Library for dynamic celebration effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Set up floating ambient particles
        const container = document.getElementById('confetti-container');
        const colors = ['#ff758c', '#ff7eb3', '#8e2de2', '#4a00e0', '#00c6ff', '#0072ff'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 15 + 5;
            const bg = colors[Math.floor(Math.random() * colors.length)];
            const left = Math.random() * 100;
            const duration = Math.random() * 12 + 10;
            const delay = Math.random() * 5;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.background = bg;
            particle.style.left = `${left}%`;
            particle.style.bottom = `-50px`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;

            // Mix circles and soft squares
            if (Math.random() > 0.5) particle.style.borderRadius = '30%';

            container.appendChild(particle);

            // Clean up the DOM once particle animation is done
            setTimeout(() => {
                particle.remove();
            }, (duration + delay) * 1000);
        }

        // Generate steady stream of particles
        setInterval(createParticle, 400);
        for (let i = 0; i < 30; i++) {
            setTimeout(createParticle, Math.random() * 3000);
        }

        // Navigation logic for Memories screen
        function showMemories() {
            const mainCard = document.getElementById('birthday-card');
            const memCard = document.getElementById('memories-card');
            
            mainCard.style.opacity = '0';
            mainCard.style.transform = 'scale(0.9) rotateX(-10deg)';
            
            setTimeout(() => {
                mainCard.style.display = 'none';
                memCard.style.display = 'block';
                // Trigger reflow
                void memCard.offsetWidth;
                memCard.style.opacity = '1';
                memCard.style.transform = 'scale(1) rotateX(0deg)';
            }, 400);
        }

        function hideMemories() {
            const mainCard = document.getElementById('birthday-card');
            const memCard = document.getElementById('memories-card');
            
            memCard.style.opacity = '0';
            memCard.style.transform = 'scale(0.9) rotateX(-10deg)';
            
            setTimeout(() => {
                memCard.style.display = 'none';
                mainCard.style.display = 'block';
                // Trigger reflow
                void mainCard.offsetWidth;
                mainCard.style.opacity = '1';
                mainCard.style.transform = 'scale(1) rotateX(0deg)';
            }, 400);
        }

        // Interaction logic when the button is pressed
        function triggerMagic() {
            // Smoothly swap messages
            const messages = [
                "You are amazing! Have a wonderful day! 🌟",
                "Cheers to another fantastic trip around the sun! 🥂",
                "Stay awesome! The world is yours today. 💎",
                "Enjoy every single moment of your special day! 🎉",
                "Here's to a brilliant and beautiful year ahead! 🚀"
            ];

            const msgEl = document.getElementById('personal-message');
            msgEl.style.opacity = '0';

            setTimeout(() => {
                msgEl.innerText = messages[Math.floor(Math.random() * messages.length)];
                msgEl.style.opacity = '0.9';
            }, 300);

            // Confetti cannons effect
            const duration = 2500;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: colors
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Big center explosion
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: colors,
                    decay: 0.9,
                    scalar: 1.2,
                    disableForReducedMotion: true
                });
            }, 200);
        }
    </script>
</body>

</html>
